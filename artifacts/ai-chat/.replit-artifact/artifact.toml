kind = "web"
previewPath = "/ai-chat/"
title = "OmniChat — Multi-IA"
version = "1.0.0"
id = "artifacts/ai-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ai-chat/" ]
localPort = 25374

[services.development]
run = "pnpm --filter @workspace/ai-chat run dev"

[services.production]
publicDir = "artifacts/ai-chat/dist/public"
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/ai-chat", "run", "build"]

[services.production.build.env]
BASE_PATH = "/ai-chat/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25374"
BASE_PATH = "/ai-chat/"
